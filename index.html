<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ResumeYar Premium CV</title>

<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}

body{
background:#0f1117;
color:#fff;
min-height:100vh;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

.form-card{
background:#171923;
padding:25px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

h1{
text-align:center;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

input,
textarea{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#222634;
color:#fff;
outline:none;
}

textarea{
resize:vertical;
min-height:120px;
}

.full{
grid-column:1/-1;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:bold;
}

.build-btn{
background:#4f46e5;
color:#fff;
}

.print-btn{
background:#059669;
color:#fff;
display:none;
}

.resume{
display:none;
margin-top:30px;
background:#fff;
color:#111;
border-radius:20px;
overflow:hidden;
}

.resume-layout{
display:grid;
grid-template-columns:320px 1fr;
}

.sidebar{
background:#111827;
color:#fff;
padding:30px;
}

.main{
padding:30px;
}

.profile{
width:180px;
height:180px;
border-radius:50%;
overflow:hidden;
margin:auto;
border:5px solid #374151;
}

.profile img{
width:100%;
height:100%;
object-fit:cover;
}

.name{
text-align:center;
margin-top:15px;
font-size:28px;
font-weight:bold;
}

.job{
text-align:center;
opacity:.8;
margin-top:8px;
}

.info{
margin-top:25px;
}

.info p{
margin-bottom:10px;
}

.section{
margin-bottom:30px;
}

.section h2{
margin-bottom:10px;
border-bottom:2px solid #ddd;
padding-bottom:8px;
}

.skills{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.skill{
background:#4f46e5;
color:#fff;
padding:8px 12px;
border-radius:20px;
font-size:14px;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

.resume-layout{
grid-template-columns:1fr;
}

}

@media print{

body{
background:#fff;
}

.form-card,
.print-btn{
display:none !important;
}

.resume{
display:block !important;
box-shadow:none;
}

}

</style>
</head>

<body>

<div class="container">

<div class="form-card">

<h1>ResumeYar Premium CV</h1>

<div class="grid">

<input id="nameFa" placeholder="نام و نام خانوادگی">

<input id="nameEn" placeholder="Full Name">

<input id="job" placeholder="عنوان شغلی / Job Title">

<input id="phone" placeholder="شماره تماس">

<input id="email" placeholder="Email">

<input id="education" placeholder="تحصیلات">

<textarea id="aboutFa" class="full" placeholder="درباره من"></textarea>

<textarea id="aboutEn" class="full" placeholder="English Summary"></textarea>

<textarea id="skills" class="full" placeholder="مهارت‌ها - با کاما جدا کن"></textarea>

<textarea id="experience" class="full" placeholder="سوابق کاری"></textarea>

<input type="file" id="photo" accept="image/*" class="full">

</div>

<button class="build-btn" onclick="buildResume()">
ساخت رزومه حرفه‌ای
</button>

<button class="print-btn" id="printBtn" onclick="window.print()">
دانلود PDF / Print
</button>

</div>
<div class="resume" id="resume">

<div class="resume-layout">

<div class="sidebar">

<div class="profile">
<img id="cvPhoto" src="" alt="">
</div>

<div class="name" id="cvName">
نام شما
</div>

<div class="job" id="cvJob">
عنوان شغلی
</div>

<div class="info">

<p id="cvPhone"></p>

<p id="cvEmail"></p>

<p id="cvEducation"></p>

</div>

</div>

<div class="main">

<div class="section">
<h2>درباره من</h2>
<p id="cvAboutFa"></p>
</div>

<div class="section">
<h2>English Summary</h2>
<p id="cvAboutEn"></p>
</div>

<div class="section">
<h2>مهارت‌ها | Skills</h2>

<div class="skills" id="cvSkills">
</div>

</div>

<div class="section">
<h2>سوابق کاری | Experience</h2>
<p id="cvExperience"></p>
</div>

</div>

</div>

</div>
<script>

function buildResume(){

const nameFa=document.getElementById("nameFa").value;
const nameEn=document.getElementById("nameEn").value;
const job=document.getElementById("job").value;
const phone=document.getElementById("phone").value;
const email=document.getElementById("email").value;
const education=document.getElementById("education").value;
const aboutFa=document.getElementById("aboutFa").value;
const aboutEn=document.getElementById("aboutEn").value;
const experience=document.getElementById("experience").value;
const skills=document.getElementById("skills").value;

document.getElementById("cvName").innerText =
nameFa || nameEn || "بدون نام";

document.getElementById("cvJob").innerText =
job;

document.getElementById("cvPhone").innerText =
"📞 " + phone;

document.getElementById("cvEmail").innerText =
"📧 " + email;

document.getElementById("cvEducation").innerText =
"🎓 " + education;

document.getElementById("cvAboutFa").innerText =
aboutFa;

document.getElementById("cvAboutEn").innerText =
aboutEn;

document.getElementById("cvExperience").innerText =
experience;

let skillsBox =
document.getElementById("cvSkills");

skillsBox.innerHTML="";

skills.split(",").forEach(skill=>{

if(skill.trim()!==""){

let tag=document.createElement("div");

tag.className="skill";

tag.innerText=skill.trim();

skillsBox.appendChild(tag);

}

});

const file =
document.getElementById("photo").files[0];

if(file){

const reader = new FileReader();

reader.onload = function(e){

document.getElementById("cvPhoto").src =
e.target.result;

};

reader.readAsDataURL(file);

}

document.getElementById("resume").style.display =
"block";

document.getElementById("printBtn").style.display =
"block";

document.getElementById("resume")
.scrollIntoView({
behavior:"smooth"
});

}

if('serviceWorker' in navigator){

navigator.serviceWorker.register(
'./service-worker.js'
);

}
// ===== Auto Save =====

const fields = [
"nameFa",
"nameEn",
"job",
"phone",
"email",
"education",
"aboutFa",
"aboutEn",
"skills",
"experience"
];

fields.forEach(id => {

const el = document.getElementById(id);

const saved = localStorage.getItem(id);

if(saved !== null){
el.value = saved;
}

el.addEventListener("input", () => {
localStorage.setItem(id, el.value);
});

});

// ذخیره عکس

const photoInput = document.getElementById("photo");

photoInput.addEventListener("change", () => {

const file = photoInput.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(e){

localStorage.setItem(
"profilePhoto",
e.target.result
);

};

reader.readAsDataURL(file);

});

// بازیابی عکس

const savedPhoto =
localStorage.getItem("profilePhoto");

if(savedPhoto){

const img =
document.getElementById("cvPhoto");

if(img){
img.src = savedPhoto;
}

}

</script>

</body>
</html>
