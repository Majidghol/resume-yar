<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ResumeYar</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">

    <!-- Icon -->
    <link rel="icon" href="assets/icon.png">

    <!-- Theme -->
    <meta name="theme-color" content="#000000">

    <style>
        body {
            font-family: sans-serif;
            background: #f4f4f4;
            text-align: center;
            padding: 40px;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px 20px;
            border: none;
            background: black;
            color: white;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>رزومه‌ساز حرفه‌ای</h1>
        <p>ساخت و دانلود رزومه PDF</p>

        <button onclick="alert('در حال توسعه 🚀')">
            ساخت رزومه
        </button>
    </div>

    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js')
            .then(reg => {
                console.log("SW OK:", reg.scope);
            })
            .catch(err => {
                console.log("SW ERROR:", err);
            });
        }
    </script>

</body>
</html>
