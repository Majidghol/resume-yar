<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>ResumeYar Pro</title>

<style>
body {
    font-family: sans-serif;
    direction: rtl;
    background: #0b1220;
    color: white;
    padding: 20px;
}

.box {
    max-width: 420px;
    margin: auto;
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
}

input, textarea {
    width: 100%;
    margin: 6px 0;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #22c55e;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    margin-top: 10px;
}

pre {
    background: #000;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="box">

<h2>📄 ResumeYar Pro</h2>

<input id="name" placeholder="نام">
<input id="lastname" placeholder="نام خانوادگی">
<input id="phone" placeholder="شماره تماس">
<input id="email" placeholder="ایمیل">
<input id="skills" placeholder="مهارت‌ها">
<input id="edu" placeholder="تحصیلات">
<input id="work" placeholder="سابقه کاری">
<textarea id="bio" placeholder="درباره من"></textarea>

<button onclick="make()">ساخت رزومه</button>

<pre id="out"></pre>

</div>

<script>
function make() {
    let name = document.getElementById("name").value;
    let lastname = document.getElementById("lastname").value;
    let phone = document.getElementById("phone").value;
    let email = document.getElementById("email").value;
    let skills = document.getElementById("skills").value;
    let edu = document.getElementById("edu").value;
    let work = document.getElementById("work").value;
    let bio = document.getElementById("bio").value;

    let text =
`====================
       RESUME
====================

نام: ${name} ${lastname}

شماره تماس: ${phone}
ایمیل: ${email}

مهارت‌ها:
${skills}

تحصیلات:
${edu}

سابقه کاری:
${work}

درباره من:
${bio}
`;

    document.getElementById("out").innerText = text;
}
</script>

</body>
</html>
